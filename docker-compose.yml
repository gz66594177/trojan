version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: stealth-trojan-db
    restart: always
    environment:
      POSTGRES_DB: stealth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - stealth-network

  # Mosquitto MQTT Broker
  mqtt:
    image: eclipse-mosquitto:2.6
    container_name: stealth-trojan-mqtt
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - stealth-network

  # Backend API
  backend:
    build: ./backend
    container_name: stealth-trojan-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: stealth
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: 1883
    depends_on:
      - postgres
      - mqtt
    networks:
      - stealth-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:latest
    container_name: stealth-trojan-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - stealth-network

volumes:
  pg_data:
  mosquitto_data:
  mosquitto_log:

networks:
  stealth-network:
    driver: bridge
